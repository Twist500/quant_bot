<!DOCTYPE html>
<html>
  <head>
    <title>Deriv OAuth Callback</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.6;
      }
      textarea {
        width: 100%;
        height: 140px;
        font-size: 14px;
      }
      button {
        padding: 12px 18px;
        font-size: 16px;
        cursor: pointer;
      }
      .box {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Deriv OAuth Callback</h2>

    <p>Copy the full URL below and paste it into PowerShell.</p>

    <div class="box">
      <textarea id="urlBox" readonly></textarea>
      <br /><br />
      <button onclick="copyUrl()">Copy URL</button>
    </div>

    <script>
      const fullUrl = window.location.href;
      document.getElementById("urlBox").value = fullUrl;

      function copyUrl() {
        navigator.clipboard.writeText(fullUrl);
        alert("Copied. Paste it into PowerShell.");
      }
    </script>
  </body>
</html>
